name: Cloud Forecast Cron

on:
  schedule:
    # GFS cycles are 00/06/12/18 UTC, but public availability lags.
    # Run after each expected public cycle window, in UTC.
    - cron: "47 3,9,15,21 * * *"
  workflow_dispatch:
    inputs:
      resolution:
        description: "Forecast cloud atlas output resolution."
        required: true
        default: "0.5"
        type: choice
        options:
          - "0.5"
          - "1"
      deploy_pages:
        description: "Deploy the generated static app to GitHub Pages staging."
        required: false
        default: false
        type: boolean
      commit_forecast:
        description: "Commit the generated forecast artifact back to main. Keep false when R2 publishing is enabled."
        required: false
        default: false
        type: boolean
      publish_r2:
        description: "Publish the generated forecast artifact to Cloudflare R2."
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cloud-forecast-staging
  cancel-in-progress: false

jobs:
  generate:
    name: Generate and validate cloud forecast
    runs-on: ubuntu-latest
    env:
      FORECAST_RESOLUTION: ${{ github.event_name == 'workflow_dispatch' && inputs.resolution || '0.5' }}
      DEPLOY_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages || github.event_name != 'workflow_dispatch' && vars.PENUMBRA_CLOUD_STAGING_DEPLOY == 'true' }}
      COMMIT_FORECAST: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_forecast == true || github.event_name == 'schedule' && vars.PENUMBRA_CLOUD_COMMIT_FORECAST == 'true' }}
      PUBLISH_R2: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_r2 == true || github.event_name == 'schedule' && vars.PENUMBRA_CLOUD_R2_ENABLED == 'true' }}
      R2_BUCKET: ${{ vars.PENUMBRA_CLOUD_R2_BUCKET }}
      R2_PREFIX: ${{ vars.PENUMBRA_CLOUD_R2_PREFIX || 'data/cloud-atlas.forecast' }}
      R2_RETAIN_GENERATIONS: ${{ vars.PENUMBRA_CLOUD_R2_RETAIN_GENERATIONS || '8' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Set up micromamba for wgrib2
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: penumbra-gfs
          create-args: >-
            -c conda-forge
            wgrib2
          cache-environment: true

      - name: Check wgrib2
        shell: bash -el {0}
        run: command -v wgrib2

      - name: Install dependencies
        run: npm ci

      - name: Inspect selected GFS source
        shell: bash -el {0}
        run: npm run inspect:gfs-cloud-source

      - name: Generate forecast artifact
        shell: bash -el {0}
        run: |
          if [ "$FORECAST_RESOLUTION" = "1" ]; then
            npm run precompute:cloud-atlas:forecast-gfs:ops
          else
            npm run precompute:cloud-atlas:forecast-gfs:0p5:ops
          fi

      - name: Stage forecast artifact for R2
        if: env.PUBLISH_R2 == 'true'
        shell: bash
        run: node scripts/precompute/stage-cloud-atlas-forecast-r2.mjs --output-dir "$RUNNER_TEMP/cloud-atlas.forecast-r2" --retain-generations "$R2_RETAIN_GENERATIONS"

      - name: Publish forecast artifact to Cloudflare R2
        if: env.PUBLISH_R2 == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          : "${CLOUDFLARE_ACCOUNT_ID:?Set GitHub secret CLOUDFLARE_ACCOUNT_ID.}"
          : "${AWS_ACCESS_KEY_ID:?Set GitHub secret CLOUDFLARE_R2_ACCESS_KEY_ID.}"
          : "${AWS_SECRET_ACCESS_KEY:?Set GitHub secret CLOUDFLARE_R2_SECRET_ACCESS_KEY.}"
          : "${R2_BUCKET:?Set GitHub variable PENUMBRA_CLOUD_R2_BUCKET.}"
          R2_PREFIX="${R2_PREFIX%/}"
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            export PATH="$HOME/.local/bin:$PATH"
          fi
          aws --version
          endpoint="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          target="s3://${R2_BUCKET}/${R2_PREFIX}"
          aws s3 sync "$RUNNER_TEMP/cloud-atlas.forecast-r2" "$target" \
            --endpoint-url "$endpoint" \
            --region auto \
            --delete \
            --exclude "manifest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp "$RUNNER_TEMP/cloud-atlas.forecast-r2/manifest.json" "$target/manifest.json" \
            --endpoint-url "$endpoint" \
            --region auto \
            --content-type "application/json" \
            --cache-control "public, max-age=60, must-revalidate"

      - name: Build static app with generated forecast
        run: npm run build

      - name: Commit forecast artifact for Vercel
        if: env.COMMIT_FORECAST == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u public/data/cloud-atlas.forecast
          git add -f public/data/cloud-atlas.forecast/manifest.json public/data/cloud-atlas.forecast/*.json
          if git diff --cached --quiet; then
            echo "No cloud forecast changes to commit."
            exit 0
          fi
          generated_at="$(node -e "const m = require('./public/data/cloud-atlas.forecast/manifest.json'); console.log(m.generatedAtUtc)")"
          git commit -m "Update cloud forecast ${generated_at}"
          git push

      - name: Upload cloud forecast artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-atlas-forecast-${{ github.run_id }}
          path: public/data/cloud-atlas.forecast
          if-no-files-found: error
          retention-days: 14

      - name: Upload static app artifact
        uses: actions/upload-artifact@v4
        with:
          name: penumbra-static-staging-${{ github.run_id }}
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        if: env.DEPLOY_PAGES == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: env.DEPLOY_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages staging
        if: env.DEPLOY_PAGES == 'true'
        uses: actions/deploy-pages@v4
